<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MFS | Home</title>

    <!-- favicon  -->

    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon" />

    <!-- font awsome  -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- daisyui + tailwind  -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section class="max-w-md min-h-screen mx-auto bg-[#08080809]">
      <div class="flex justify-between items-center p-4 bg-white">
        <div class="flex justify-between items-center gap-3">
          <div class="w-15">
            <img src="images/logo.png" alt="" />
          </div>
          <div>
            <p class="font-bold text-3xl">$45000</p>
            <p class="text-[#08080863]">Available Balance</p>
          </div>
        </div>
        <div>
          <button
            class="px-2 py-1 text-sm sm:px-3 sm:py-2 sm:text-base md:px-4 md:py-2 md:text-5 bg-transparent text-[#08080881] rounded-lg border border-[#08080839]"
          >
            <i class="fa-solid fa-arrow-right-from-bracket -scale-x-100"></i>Log
            Out
          </button>
        </div>
      </div>
      <hr class="border border-[#0808080f]" />
      <div class="bg-white rounded-b-2xl p-5">
        <div class="space-y-5">
          <h1 class="font-bold text-2xl">
            Welcome To Pay<span class="text-[#7460FF]">oo</span>
          </h1>
          <p class="text-[#08080896]">
            Enjoy easy and convenient financial services with us. <br />Cashout
            charge is low.
          </p>
        </div>
        <div class="pt-6 grid grid-cols-3 grid-rows-2 gap-3">
          <div
            class="card border border-[#0808080f] py-6 flex flex-col items-center space-y-2 cursor-pointer hover:bg-blue-200"
          >
            <img class="w-6 h-6 object-contain" src="images/opt-1.png" alt="" />
            <p>Add Money</p>
          </div>
          <div
            class="card border border-[#0808080f] py-6 flex flex-col items-center space-y-2 cursor-pointer hover:bg-blue-200"
          >
            <img class="w-6 h-6 object-contain" src="images/opt-2.png" alt="" />
            <p>Cash Out</p>
          </div>
          <div
            class="card border border-[#0808080f] py-6 flex flex-col items-center space-y-2 cursor-pointer hover:bg-blue-200"
          >
            <img class="w-6 h-6 object-contain" src="images/opt-3.png" alt="" />
            <p>Transfer Money</p>
          </div>
          <div
            class="card border border-[#0808080f] py-6 flex flex-col items-center space-y-2 cursor-pointer hover:bg-blue-200"
          >
            <img class="w-6 h-6 object-contain" src="images/opt-4.png" alt="" />
            <p>Get Bonus</p>
          </div>
          <div
            class="card border border-[#0808080f] py-6 flex flex-col items-center space-y-2 cursor-pointer hover:bg-blue-200"
          >
            <img class="w-6 h-6 object-contain" src="images/opt-5.png" alt="" />
            <p>Pay Bill</p>
          </div>
          <div
            class="card border border-[#0808080f] py-6 flex flex-col items-center space-y-2 cursor-pointer hover:bg-blue-200"
          >
            <img class="w-6 h-6 object-contain" src="images/opt-6.png" alt="" />
            <p>Transaction</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
